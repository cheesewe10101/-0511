name: Build OpenBSD Very Cool System

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pillow keyboard pycaw comtypes
    
    - name: Build executable
      shell: pwsh
      run: |
        $currentDir = (Get-Location).Path
        pyinstaller --onefile --windowed `
          --name "amalgam" `
          --add-data "$currentDir\рыбка.jpeg;." `
          --add-data "$currentDir\nya.ico;." `
          --add-data "$currentDir\ljnn.mp3;." `
          --add-data "$currentDir\trava.mp3;." `
          --hidden-import pygame `
          --hidden-import keyboard `
          --hidden-import pycaw `
          --hidden-import comtypes `
          larp.py
    
    - name: Verify build
      shell: pwsh
      run: |
        if (Test-Path "dist\openbsdverycoolsystem.exe") {
          $size = (Get-Item "dist\openbsdverycoolsystem.exe").Length
          Write-Host "✅ Build successful! Size: $([math]::Round($size/1MB, 2)) MB"
        } else {
          Write-Host "❌ Build failed - executable not found"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openbsdverycoolsystem
        path: dist/*.exe
        compression-level: 9
        retention-days: 14
